groups:
  - name: fms-alerts
    rules:
      - alert: FmsHighEvaluationLatency
        expr: histogram_quantile(0.99, sum(rate(fms_eval_latency_seconds_bucket[5m])) by (le)) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: FMS remote evaluation P99 latency above 20ms

      - alert: FmsLowCacheHitRatio
        expr: fms_cache_hit_ratio < 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: FMS Redis L2 cache hit ratio below 95%

      - alert: FmsConfigPropagationLag
        expr: max(fms_config_version_lag_seconds) > 60
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: FMS config propagation lag exceeds 60 seconds

      - alert: FmsPublishBacklog
        expr: fms_publish_jobs_backlog > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: FMS publish job backlog is growing

      - alert: FmsErrorRateSpike
        expr: sum(rate(fms_errors_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: FMS application error rate spike

      - alert: FmsKillSwitchActivated
        expr: increase(fms_kill_switch_activations_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: FMS kill switch activated
