spring:
  application:
    name: fms-server

  datasource:
    url: jdbc:postgresql://${FMS_DB_HOST:localhost}:${FMS_DB_PORT:5432}/${FMS_DB_NAME:fms}
    username: ${FMS_DB_USER:fms}
    password: ${FMS_DB_PASSWORD:fms}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${FMS_REDIS_HOST:localhost}
      port: ${FMS_REDIS_PORT:6379}
      password: ${FMS_REDIS_PASSWORD:}
      ssl:
        enabled: ${FMS_REDIS_SSL:false}
      repositories:
        enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${FMS_OIDC_ISSUER_URI:https://login.example.com/}

server:
  port: ${FMS_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

fms:
  api:
    version: v1
  security:
    oauth2:
      enabled: false
  sync:
    delta-max-gap: 100
    snapshot-ttl: 24h
    sse-heartbeat-interval-ms: 30000
    sse-timeout: 1h
  worker:
    publish:
      poll-interval-ms: 5000

springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_1
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fms: INFO
    org.springframework.security: INFO
